name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Queueing-only concurrency on release: if two tag pushes arrive close
# together, run them in order rather than racing for the same GitHub
# Release / npm publish. cancel-in-progress is intentionally false —
# we never want to kill a halfway-done deploy.
concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: publish to npm
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: sync package.json version from tag
        run: |
          # Strip leading 'v' from the tag (e.g. v1.0.0 -> 1.0.0) and
          # rewrite package.json in place. This is a release-time mutation
          # only — never committed back to main.
          tag="${{ github.ref_name }}"
          version="${tag#v}"
          node -e "
            const fs = require('node:fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.argv[1];
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          " "$version"
          echo "package.json version synced to $version"
          node -e "console.log(require('./package.json').version)"

      - name: npm publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  smoke:
    name: post-publish smoke
    # Catches install-time regressions (missing bin entries, broken shebangs,
    # missing files in the published tarball) that npm publish itself accepts
    # but post-install execution fails on. Orch shipped v0.2.0 / v0.2.1 / v0.2.2
    # with this exact failure class — this job exists so shim never does.
    #
    # Skip on workflow_dispatch dry-run invocations (if/when one is added).
    # Tag pushes always run this.
    if: ${{ github.event_name == 'push' || inputs.dry_run != true }}
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install just-published package
        # Tag pushes set GITHUB_REF_NAME to the tag (e.g. v0.2.3); strip the leading v.
        # workflow_dispatch on a branch falls back to the latest version on the registry.
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(curl -s https://registry.npmjs.org/@agent-ops/synadia-agent-shim/latest | jq -r .version)
          fi
          echo "installing @agent-ops/synadia-agent-shim@$VERSION"
          # Retry up to 5 times in case of registry propagation lag.
          for i in 1 2 3 4 5; do
            if npm install -g "@agent-ops/synadia-agent-shim@$VERSION"; then break; fi
            echo "install attempt $i failed; sleeping 10s and retrying..."
            sleep 10
          done
          npm list -g --depth=0 | grep '@agent-ops/synadia-agent-shim' || (echo "package not installed" && exit 1)

      - name: bin shim probe
        # Proves every declared bin entry actually resolves on PATH and is executable.
        run: |
          set -e
          for cmd in synadia-agent-shim orch-agent-shim; do
            which "$cmd"
          done

      - name: smoke — synadia-agent-shim --help
        # Proves the binary loads and prints its help text.
        run: synadia-agent-shim --help
